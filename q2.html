  <body>
    <h2 id="story"></h2>

    <p>
      高二開學過了一個學期，你發現在體育班的生態跟想像的有點差異，大家都瘋狂訓練能靠專長升學，但你好像怎麼努力都還差一點，
      有點想多考慮跟準備一點未來學業，不要一直都以專長為主，可是又會跟一起練習的好友有不同的行程，漸行漸遠，這樣你會怎麼做呢?
    </p>

    <!-- A -->
    <a onclick="choose('A')" href="q3.html" class="choice">
      A: 讀書麻煩，反正我也讀不起來專長也練不起來，乾脆多耍一點廢
    </a>

    <br /><br />

    <!-- B -->
    <a onclick="choose('B')" href="q3.html" class="choice">
      B:
      因為很珍惜難得的知心好友，不知道還會不會遇到被支持的關係，留在的訓練強度中，課業靠自己想辦法
    </a>

    <br /><br />

    <!-- C -->
    <a onclick="choose('C')" href="q3.html" class="choice">
      C: 果斷投入學業，雖然要跟好友的關係變差，但是未來的出路優先
    </a>

  </body>

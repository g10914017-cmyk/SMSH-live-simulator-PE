    <h2 id="story"></h2>

    <p>
      二開學過了一個學期，你發現自己選的類組跟自己想像的有點差異，有想考慮轉組，可是又要重新適應新的班級跟環境，跟好不容易認識的知心好友分開，你會怎麼做呢?
    </p>

    <!-- A -->
    <a onclick="choose('A')" href="q3.html" class="choice">
      A: 轉組麻煩，反正要考的我這班也不會教，乾脆多耍一點廢
    </a>

    <br /><br />

    <!-- B -->
    <a onclick="choose('B')" href="q3.html" class="choice">
      B:
      因為很珍惜難得的知心好友，不知道還會不會遇到被支持的關係，留在原本的班級，課業靠自己想辦法
    </a>

    <br /><br />

    <!-- C -->
    <a onclick="choose('C')" href="q3.html" class="choice">
      C: 果斷申請轉組，雖然要跟好友分開，但是未來優先
    </a>

    <h2 id="story"></h2>

    <p>
      高三開學了，周遭開始瀰漫起準備大考的氣氛，看著同學們都漸漸開始念書，我是不是也該用功一點呢?
      可是回顧過往，高中生活好像還有點遺憾…你會怎麼規劃這學期呢?
    </p>

    <!-- A -->
    <a onclick="choose('A')" href="q5.html" class="choice">
      A: 擬定讀書計畫跟時間表，全力衝刺考試，排除一切困擾
    </a>

    <br /><br />

    <!-- B -->
    <a onclick="choose('B')" href="q5.html" class="choice">
      B: 把握最後跟同學相處的時光，書還是會讀，但也想跟大家多相處
    </a>

    <br /><br />

    <!-- C -->
    <a onclick="choose('C')" href="q5.html" class="choice">
      C: 依然持續投入自己熱愛的興趣當中，考試順其自然就好
    </a>

    <br /><br />

    <!-- D -->
    <a onclick="choose('D')" href="q5.html" class="choice">
      D:
      考試感覺無望了，不如趁現在備考階段競爭少，找壓力大的一起把手遊排名往上衝
    </a>

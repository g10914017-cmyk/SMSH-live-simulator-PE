    <h2 id="story"></h2>

    <p>
      到了高二下，專長的隊友因為自己的身心狀況不佳，想把帶領練習的學長退掉，希望能力很好又對體育有興趣的你，可以幫忙接下這個機會，繼續陪大家完成這學期的活動。你自己對社團也很有興趣，可是好像又快要考試了。
    </p>

    <!-- A -->
    <a onclick="choose('A')" href="q4.html" class="choice">
      A: 準備好承擔任何重要職務，全心全意投入校隊經營，其他都放一邊
    </a>

    <br /><br />

    <!-- B -->
    <a onclick="choose('B')" href="q4.html" class="choice">
      B:
      好麻煩喔裝死不管，反正船到橋頭自然直，就沒我的事了，趁還有學長姐再做事約專長的朋友出去，多打幾場荒野跟傳說比較有意義
    </a>

    <br /><br />

    <!-- C -->
    <a onclick="choose('C')" href="q4.html" class="choice">
      C: 表達想當一個體育生就好，課業跟比賽才是我最看重的，不想多花時間處理無關的事情，對帶練習也沒有興趣
    </a>
